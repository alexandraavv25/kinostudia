<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KINOSTUDIAAA*</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream: #F0EDE4;
      --red: #8B0000;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--red);
      font-family: 'Space Grotesk', sans-serif;
    }

    .map-container {
      position: fixed;
      inset: 0;
      overflow: hidden;
      cursor: grab;
    }

    .map-container.is-dragging {
      cursor: grabbing;
    }

    .map-canvas {
      position: absolute;
      width: 1200px;
      height: 1100px;
      left: 50%;
      top: 50%;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    /* LINES */
    .ml {
      stroke: var(--cream);
      stroke-width: 0.6;
      fill: none;
      opacity: 0.25;
    }

    /* NODES */
    .mn circle {
      fill: var(--cream) !important;
      opacity: 0.85;
    }

    .mn text {
      fill: var(--cream);
      pointer-events: none;
    }

    .lbl {
      font-size: 10.5px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.88;
    }

    .sub {
      font-size: 8px;
      letter-spacing: 0.05em;
      opacity: 0.55;
    }
  </style>
</head>

<body>

<div class="map-container" id="mapContainer">
  <div class="map-canvas" id="mapCanvas">

    <svg viewBox="0 0 1800 1100">

      <!-- LINES -->
      <line class="ml" x1="900" y1="548" x2="1180" y2="302"/>
      <line class="ml" x1="1180" y1="302" x2="1428" y2="222"/>
      <line class="ml" x1="900" y1="548" x2="1252" y2="714"/>
      <line class="ml" x1="900" y1="548" x2="552" y2="316"/>
      <line class="ml" x1="552" y1="316" x2="388" y2="570"/>
      <line class="ml" x1="900" y1="548" x2="658" y2="758"/>
      <line class="ml" x1="900" y1="548" x2="984" y2="856"/>

      <!-- CENTER (FIXED COLOR) -->
      <g class="mn">
        <circle cx="900" cy="548" r="4" fill="var(--cream)"/>
        <text class="lbl" x="900" y="533" text-anchor="middle">KINOSTUDIAAA*</text>
      </g>

      <!-- FILMS -->
      <a href="/films.html">
        <g class="mn">
          <circle cx="1180" cy="302" r="14"/>
          <text class="lbl" x="1195" y="297">*films</text>
          <text class="sub" x="1195" y="310">short films · mv</text>
        </g>
      </a>

      <!-- INSTAGRAM -->
      <a href="https://instagram.com/kinostudiaaa" target="_blank">
        <g class="mn">
          <circle cx="1428" cy="222" r="3"/>
          <text class="lbl" x="1441" y="217">*instagram</text>
          <text class="sub" x="1441" y="231">portfolio · events</text>
        </g>
      </a>

      <!-- PUBLICATIONS -->
      <a href="/publications.html">
        <g class="mn">
          <circle cx="1252" cy="714" r="3"/>
          <text class="lbl" x="1265" y="709">*publications</text>
          <text class="sub" x="1265" y="723">digital zines</text>
        </g>
      </a>

      <!-- NOTES -->
      <a href="https://youtube.com/@alexmesherina" target="_blank">
        <g class="mn">
          <circle cx="552" cy="316" r="3"/>
          <text class="lbl" x="539" y="306" text-anchor="end">*notes</text>
          <text class="sub" x="539" y="320" text-anchor="end">founder podcast</text>
        </g>
      </a>

      <!-- REELS -->
      <a href="https://instagram.com/alexmesherina" target="_blank">
        <g class="mn">
          <circle cx="388" cy="570" r="3"/>
          <text class="lbl" x="375" y="560" text-anchor="end">*reels</text>
          <text class="sub" x="375" y="574" text-anchor="end">bts</text>
        </g>
      </a>

      <!-- LINKEDIN -->
      <a href="https://linkedin.com/company/kinostudiaaa" target="_blank">
        <g class="mn">
          <circle cx="658" cy="758" r="3"/>
          <text class="lbl" x="645" y="748" text-anchor="end">*linkedin</text>
          <text class="sub" x="645" y="762" text-anchor="end">updates</text>
        </g>
      </a>

      <!-- NIGHTS -->
      <a href="mailto:alexmesherina@gmail.com?subject=KINOSTUDIAAA*">
        <g class="mn">
          <circle cx="984" cy="856" r="3"/>
          <text class="lbl" x="984" y="874" text-anchor="middle">*nights</text>
          <text class="sub" x="984" y="888" text-anchor="middle">screenings</text>
        </g>
      </a>

    </svg>
  </div>
</div>

<script>
  const container = document.getElementById('mapContainer');
  const canvas = document.getElementById('mapCanvas');

  let isDragging = false;
  let startX = 0;
  let startY = 0;
  let x = 0;
  let y = 0;

  function applyTransform() {
    canvas.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
  }

  applyTransform();

  container.addEventListener('mousedown', (e) => {
    if (e.target.closest('.mn')) return;
    isDragging = true;
    startX = e.clientX - x;
    startY = e.clientY - y;
    container.classList.add('is-dragging');
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    x = e.clientX - startX;
    y = e.clientY - startY;
    applyTransform();
  });

  window.addEventListener('mouseup', () => {
    isDragging = false;
    container.classList.remove('is-dragging');
  });
</script>

</body>
</html>
